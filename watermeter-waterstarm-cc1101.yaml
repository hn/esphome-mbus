esphome:
  name: watermeter-waterstarm
  friendly_name: Watermeter WaterStarM
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "CC1101 Fallback Hotspot"
    password: !secret wifi_ap_password

captive_portal:

time:
  - platform: homeassistant

external_components:
  - source: github://hn/esphome-mbus@main
    components: [ cc1101, mbus ]

spi:
  clk_pin: GPIO4
  mosi_pin: GPIO6
  miso_pin: GPIO5

cc1101:
  id: cc1101_radio
  cs_pin: GPIO7
  gdo0_pin: GPIO10

  # --- RF front-end
  frequency: 868.95MHz
  modulation_type: "2-FSK"
  symbol_rate: 103150
  fsk_deviation: 38kHz
  filter_bandwidth: 325kHz
  if_frequency: 203.125kHz
  channel: 0
  channel_spacing: 200kHz
  num_preamble: 2

  # --- Sync / framing
  sync_mode: "16/16"
  carrier_sense_above_threshold: true
  manchester: false
  dc_blocking_filter: true
  sync1: 0x54
  sync0: 0x3D

  # --- AGC
  magn_target: "33dB"
  max_lna_gain: "Default"
  max_dvga_gain: "-1"
  carrier_sense_abs_thr: -7
  lna_priority: false
  hyst_level: "Medium"
  wait_time: "32"
  freeze: "On Sync"
  filter_length_fsk_msk: "16"

  # --- Packet handling ---
  crc_enable: false
  whitening: false
  rx_attenuation: "0dB"
  output_power: 10

  # --- Frequency offset compensation
  foc_bs_cs_gate: true
  foc_pre_k: "2K"
  foc_post_k: "K/2"
  foc_limit: "BW/4"

  # --- Bit synchronization
  bs_pre_ki: "3KI"
  bs_pre_kp: "4KP"
  bs_post_ki: "KI/2"
  bs_post_kp: "KP"
  bs_limit: "12.5%"
  
  packet_mode: true
  packet_length: 0
  packet_length_lambda: |-
    if (x.size() < 2) return 0;
    if (x[0] != 0x54 || x[1] != 0xCD) return -1;
    if (x.size() < 3) return 0;
    const uint8_t l = x[2];
    const uint8_t blocks = (l < 26) ? 2 : ((l - 26) / 16 + 3);
    return l + 1 + 2 * blocks + 2;
  on_packet:
    then:
      - lambda: |-
          ESP_LOGD("cc1101_rx", "RX %u bytes  RSSI=%.0f dBm  LQI=%u  dFreq=%.0f Hz",
                   x.size(), rssi, lqi, freq_offset);

mbus:
  id: waterstar_wireless
  radio_cc1101_id: cc1101_radio
  encryption_key: !secret garden_watermeter_aes_key
  dump_records: false

sensor:
  - platform: mbus
    mbus_id: waterstar_wireless
    name: "Total water consumption"
    dif: 0x04
    vif: 0x13
    storage: 0
    tariff: 0
    subunit: 0
    function: instantaneous
    unit_of_measurement: "m³"
    device_class: water
    state_class: total_increasing
    accuracy_decimals: 3
    icon: mdi:water-pump
    filters:
      - multiply: 0.001

  - platform: mbus
    mbus_id: waterstar_wireless
    name: "Meter internal time"
    dif: 0x04
    vif: 0x6D
    storage: 0
    tariff: 0
    subunit: 0
    function: instantaneous
    device_class: timestamp
    entity_category: diagnostic

  - platform: mbus
    mbus_id: waterstar_wireless
    name: "Water backflow"
    dif: 0x44
    vif: 0x13
    storage: 1
    tariff: 0
    subunit: 0
    function: instantaneous
    vife: [0x3C]
    unit_of_measurement: "m³"
    device_class: water
    state_class: total_increasing
    accuracy_decimals: 3
    icon: mdi:skip-backward
    entity_category: diagnostic
    filters:
      - multiply: 0.001

binary_sensor:
  - platform: mbus
    mbus_id: waterstar_wireless
    name: "Meter battery"
    dif: 0x02
    vif: 0x7D
    vif_ext: 0x7D17
    storage: 0
    tariff: 0
    subunit: 0
    function: instantaneous
    bit: 4
    device_class: battery
    entity_category: diagnostic

  - platform: mbus
    mbus_id: waterstar_wireless
    name: "Leakage"
    dif: 0x02
    vif: 0x7D
    vif_ext: 0x7D17
    storage: 0
    tariff: 0
    subunit: 0
    function: instantaneous
    bit: 6
    device_class: problem

  - platform: mbus
    mbus_id: waterstar_wireless
    name: "Reverse flow"
    dif: 0x02
    vif: 0x7D
    vif_ext: 0x7D17
    storage: 0
    tariff: 0
    subunit: 0
    function: instantaneous
    bit: 7
    device_class: problem
    entity_category: diagnostic
